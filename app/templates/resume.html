{% extends "base.html" %}

{% block content %}
<div class="row">
  <div class="col-md-8 mx-auto">
    <div class="card mt-4">
      <div class="card-body">
        <!-- Resume content -->
        <div class="resume-content">
          {{ content | safe }}
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  .resume-content {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    line-height: 1.8;
    color: #333;
  }

  .resume-content h1 {
    border-bottom: 2px solid #007bff;
    padding-bottom: 10px;
    margin-top: 0;
    margin-bottom: 20px;
    font-size: 2.5em;
  }

  .resume-content h2 {
    color: #007bff;
    font-size: 1.5em;
    margin-top: 30px;
    margin-bottom: 15px;
    border-left: 4px solid #007bff;
    padding-left: 10px;
  }

  .resume-content h3 {
    color: #495057;
    font-size: 1.2em;
    margin-top: 15px;
    margin-bottom: 5px;
  }

  .resume-content ul, .resume-content ol {
    margin-bottom: 10px;
  }

  .resume-content li {
    margin-bottom: 5px;
  }

  .resume-content p {
    margin-bottom: 10px;
  }

  .resume-content strong {
    color: #212529;
  }

  .resume-content em {
    color: #6c757d;
  }

  .resume-content hr {
    border-top: 1px solid #e9ecef;
    margin: 20px 0;
  }

  .resume-content code {
    background-color: #f8f9fa;
    padding: 2px 6px;
    border-radius: 3px;
    color: #d63384;
    font-family: 'Courier New', monospace;
  }

  .resume-content blockquote {
    border-left: 4px solid #e9ecef;
    padding-left: 15px;
    margin-left: 0;
    color: #6c757d;
  }

  /* Print styles for better PDF printing */
  @media print {
    body {
      background: white;
    }
    .card {
      border: none;
      box-shadow: none;
    }
    .resume-content h2 {
      page-break-after: avoid;
    }
  }
</style>
{% endblock %}
