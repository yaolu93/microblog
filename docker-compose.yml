version: '3.8'

services:
  db:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: microblog
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:6-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  web:
    build: .
    command: gunicorn microblog:app -b 0.0.0.0:8000 -w 4 --log-level debug --access-logfile - --error-logfile -
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://postgres:example@db:5432/microblog
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_URL=
      - RUN_MIGRATIONS=true
      - LOG_TO_STDOUT=true
      - FLASK_DEBUG=1
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/home/microblog
    restart: always

  worker:
    build: .
    command: rq worker microblog-tasks
    depends_on:
      - redis
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:example@db:5432/microblog
      - REDIS_URL=redis://redis:6379/0
      - RUN_MIGRATIONS=false
      - LOG_TO_STDOUT=true
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/home/microblog
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - web
      - redis
    restart: always

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      - redis
    restart: always

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:example@db:5432/microblog?sslmode=disable"
    depends_on:
      - db
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: always

volumes:
  db_data:
  prometheus_data:
  grafana_data:
